<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">

  <defs>
    <linearGradient id="bgan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1218"/>
      <stop offset="100%" stop-color="#080a0e"/>
    </linearGradient>
    <linearGradient id="anm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7880a0"/>
      <stop offset="40%" stop-color="#c8ccd8"/>
      <stop offset="100%" stop-color="#6070a0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bgan)"/>
  <pattern id="gan" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e05a1e" stroke-width="0.2" opacity="0.1"/>
  </pattern>
  <rect width="400" height="300" fill="url(#gan)"/>
  <!-- Concrete base -->
  <rect x="0" y="185" width="400" height="115" fill="#303540" opacity="0.6"/>
  <rect x="0" y="185" width="400" height="4" fill="#505868" opacity="0.5"/>
  <!-- Aggregate dots in concrete -->
  <g fill="#404858" opacity="0.5">
    <circle cx="50" cy="210" r="5"/><circle cx="90" cy="230" r="4"/>
    <circle cx="140" cy="215" r="6"/><circle cx="180" cy="240" r="4"/>
    <circle cx="230" cy="205" r="5"/><circle cx="270" cy="235" r="7"/>
    <circle cx="320" cy="220" r="5"/><circle cx="360" cy="245" r="4"/>
    <circle cx="70" cy="255" r="6"/><circle cx="200" cy="260" r="5"/>
    <circle cx="300" cy="265" r="4"/><circle cx="100" cy="280" r="7"/>
  </g>
  <!-- J-Bolt anchor bolt (main) -->
  <g transform="translate(130,185)">
    <!-- Threaded shaft -->
    <rect x="-8" y="-145" width="16" height="145" fill="url(#anm)"/>
    <!-- Thread marks -->
    <g stroke="#9098b0" stroke-width="1.5" opacity="0.6">
      <line x1="-10" y1="-130" x2="10" y2="-130"/>
      <line x1="-10" y1="-118" x2="10" y2="-118"/>
      <line x1="-10" y1="-106" x2="10" y2="-106"/>
      <line x1="-10" y1="-94" x2="10" y2="-94"/>
      <line x1="-10" y1="-82" x2="10" y2="-82"/>
      <line x1="-10" y1="-70" x2="10" y2="-70"/>
      <line x1="-10" y1="-58" x2="10" y2="-58"/>
      <line x1="-10" y1="-46" x2="10" y2="-46"/>
    </g>
    <!-- Hex nut -->
    <polygon points="-14,-140 0,-148 14,-140 14,-128 0,-120 -14,-128" fill="#9098b8"/>
    <polygon points="-14,-140 0,-148 14,-140 14,-128 0,-120 -14,-128" fill="none" stroke="#e05a1e" stroke-width="1.5" opacity="0.6"/>
    <!-- J-bend (embedded in concrete) -->
    <path d="M -8,0 Q -8,40 20,40 Q 48,40 48,20 L 48,0" fill="none" stroke="url(#anm)" stroke-width="16" stroke-linecap="round"/>
    <!-- Washer at surface -->
    <ellipse cx="0" cy="0" rx="20" ry="6" fill="#a0a8c0"/>
    <ellipse cx="0" cy="0" rx="10" ry="3" fill="#e05a1e" opacity="0.5"/>
  </g>
  <!-- L-Bolt anchor (secondary) -->
  <g transform="translate(270,185)">
    <rect x="-6" y="-120" width="12" height="120" fill="url(#anm)" opacity="0.85"/>
    <!-- Thread marks -->
    <g stroke="#9098b0" stroke-width="1" opacity="0.5">
      <line x1="-8" y1="-110" x2="8" y2="-110"/>
      <line x1="-8" y1="-100" x2="8" y2="-100"/>
      <line x1="-8" y1="-90" x2="8" y2="-90"/>
      <line x1="-8" y1="-80" x2="8" y2="-80"/>
      <line x1="-8" y1="-70" x2="8" y2="-70"/>
      <line x1="-8" y1="-60" x2="8" y2="-60"/>
    </g>
    <!-- L-bend at bottom -->
    <path d="M -6,0 Q -6,30 24,30" fill="none" stroke="url(#anm)" stroke-width="12" stroke-linecap="round" opacity="0.85"/>
    <!-- Hex nut -->
    <polygon points="-11,-115 0,-122 11,-115 11,-105 0,-98 -11,-105" fill="#8090b0" opacity="0.85"/>
    <!-- Washer -->
    <ellipse cx="0" cy="0" rx="16" ry="5" fill="#9098b8" opacity="0.85"/>
  </g>
  <!-- Labels -->
  <text x="130" y="155" font-family="Arial, sans-serif" font-size="11" fill="#e05a1e" text-anchor="middle" opacity="0.8">J-Bolt</text>
  <text x="270" y="170" font-family="Arial, sans-serif" font-size="11" fill="#e05a1e" text-anchor="middle" opacity="0.8">L-Bolt</text>
  <rect x="0" y="255" width="400" height="45" fill="#000000" opacity="0.55"/>
  <text x="200" y="283" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="#e05a1e" text-anchor="middle" letter-spacing="3">ANGKUR (ANCHOR BOLT)</text>

</svg>