<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">

  <defs>
    <linearGradient id="bgwm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1218"/>
      <stop offset="100%" stop-color="#080a0e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bgwm)"/>
  <pattern id="gwm" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-width="0.2" opacity="0.05"/>
  </pattern>
  <rect width="400" height="300" fill="url(#gwm)"/>
  <!-- Wiremesh grid illustration -->
  <g transform="translate(200,148)">
    <!-- Perspective grid base -->
    <g opacity="0.15">
      <line x1="-160" y1="100" x2="0" y2="-40" stroke="#9098b8" stroke-width="1"/>
      <line x1="-130" y1="100" x2="30" y2="-40" stroke="#9098b8" stroke-width="1"/>
      <line x1="-100" y1="100" x2="60" y2="-40" stroke="#9098b8" stroke-width="1"/>
      <line x1="-70" y1="100" x2="90" y2="-40" stroke="#9098b8" stroke-width="1"/>
      <line x1="-160" y1="80" x2="160" y2="80" stroke="#9098b8" stroke-width="1"/>
      <line x1="-160" y1="50" x2="160" y2="50" stroke="#9098b8" stroke-width="1"/>
    </g>
    <!-- Welded wire grid - horizontal wires -->
    <g stroke="#b0b8c8" stroke-width="4" stroke-linecap="round">
      <line x1="-155" y1="-70" x2="155" y2="-70"/>
      <line x1="-155" y1="-40" x2="155" y2="-40"/>
      <line x1="-155" y1="-10" x2="155" y2="-10"/>
      <line x1="-155" y1="20" x2="155" y2="20"/>
      <line x1="-155" y1="50" x2="155" y2="50"/>
      <line x1="-155" y1="80" x2="155" y2="80"/>
    </g>
    <!-- Welded wire grid - vertical wires -->
    <g stroke="#c8ccd8" stroke-width="4" stroke-linecap="round">
      <line x1="-150" y1="-85" x2="-150" y2="95"/>
      <line x1="-120" y1="-85" x2="-120" y2="95"/>
      <line x1="-90" y1="-85" x2="-90" y2="95"/>
      <line x1="-60" y1="-85" x2="-60" y2="95"/>
      <line x1="-30" y1="-85" x2="-30" y2="95"/>
      <line x1="0" y1="-85" x2="0" y2="95"/>
      <line x1="30" y1="-85" x2="30" y2="95"/>
      <line x1="60" y1="-85" x2="60" y2="95"/>
      <line x1="90" y1="-85" x2="90" y2="95"/>
      <line x1="120" y1="-85" x2="120" y2="95"/>
      <line x1="150" y1="-85" x2="150" y2="95"/>
    </g>
    <!-- Weld spot highlights -->
    <g fill="#e05a1e" opacity="0.7">
      <circle cx="-150" cy="-70" r="5"/>
      <circle cx="-120" cy="-70" r="5"/>
      <circle cx="-90" cy="-70" r="5"/>
      <circle cx="-60" cy="-70" r="5"/>
      <circle cx="-30" cy="-70" r="5"/>
      <circle cx="0" cy="-70" r="5"/>
      <circle cx="30" cy="-70" r="5"/>
      <circle cx="60" cy="-70" r="5"/>
      <circle cx="90" cy="-70" r="5"/>
      <circle cx="120" cy="-70" r="5"/>
      <circle cx="150" cy="-70" r="5"/>
    </g>
    <g fill="#e05a1e" opacity="0.5">
      <circle cx="-150" cy="-40" r="5"/>
      <circle cx="-90" cy="-40" r="5"/>
      <circle cx="-30" cy="-40" r="5"/>
      <circle cx="30" cy="-40" r="5"/>
      <circle cx="90" cy="-40" r="5"/>
      <circle cx="150" cy="-40" r="5"/>
      <circle cx="-150" cy="-10" r="5"/>
      <circle cx="-90" cy="-10" r="5"/>
      <circle cx="-30" cy="-10" r="5"/>
      <circle cx="30" cy="-10" r="5"/>
      <circle cx="90" cy="-10" r="5"/>
      <circle cx="150" cy="-10" r="5"/>
      <circle cx="-150" cy="20" r="5"/>
      <circle cx="-90" cy="20" r="5"/>
      <circle cx="-30" cy="20" r="5"/>
      <circle cx="30" cy="20" r="5"/>
      <circle cx="90" cy="20" r="5"/>
      <circle cx="150" cy="20" r="5"/>
    </g>
    <!-- M label -->
    <text x="-140" y="-58" font-family="Arial Black, sans-serif" font-size="9" fill="#e05a1e" opacity="0.5">M8</text>
  </g>
  <rect x="0" y="255" width="400" height="45" fill="#000000" opacity="0.55"/>
  <text x="200" y="283" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="#e05a1e" text-anchor="middle" letter-spacing="3">WIREMESH (WELDED WIRE MESH)</text>

</svg>