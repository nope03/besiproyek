<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">

  <!-- Rebar cross-section and profile -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#0d0d10"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b87333"/>
      <stop offset="50%" stop-color="#e08030"/>
      <stop offset="100%" stop-color="#a06020"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
  </pattern>
  <rect width="400" height="300" fill="url(#grid)"/>
  <!-- Three rebar rods -->
  <g transform="translate(200,150)">
    <!-- Rod 1 (back) -->
    <ellipse cx="-55" cy="-20" rx="12" ry="12" fill="#7a4010" opacity="0.7"/>
    <rect x="-67" y="-90" width="24" height="170" rx="12" fill="url(#steel)" opacity="0.7"/>
    <ellipse cx="-55" cy="80" rx="12" ry="12" fill="#e08030" opacity="0.7"/>
    <!-- Ribs on rod 1 -->
    <g opacity="0.6">
      <rect x="-71" y="-60" width="32" height="5" rx="2" fill="#ff9944"/>
      <rect x="-71" y="-40" width="32" height="5" rx="2" fill="#ff9944"/>
      <rect x="-71" y="-20" width="32" height="5" rx="2" fill="#ff9944"/>
      <rect x="-71" y="0" width="32" height="5" rx="2" fill="#ff9944"/>
      <rect x="-71" y="20" width="32" height="5" rx="2" fill="#ff9944"/>
      <rect x="-71" y="40" width="32" height="5" rx="2" fill="#ff9944"/>
    </g>
    <!-- Rod 2 (middle) -->
    <ellipse cx="0" cy="-10" rx="14" ry="14" fill="#7a4010"/>
    <rect x="-14" y="-95" width="28" height="185" rx="14" fill="url(#steel)"/>
    <ellipse cx="0" cy="90" rx="14" ry="14" fill="#e08030"/>
    <!-- Ribs on rod 2 -->
    <g>
      <rect x="-18" y="-65" width="36" height="6" rx="3" fill="#ffaa55"/>
      <rect x="-18" y="-43" width="36" height="6" rx="3" fill="#ffaa55"/>
      <rect x="-18" y="-21" width="36" height="6" rx="3" fill="#ffaa55"/>
      <rect x="-18" y="1" width="36" height="6" rx="3" fill="#ffaa55"/>
      <rect x="-18" y="23" width="36" height="6" rx="3" fill="#ffaa55"/>
      <rect x="-18" y="45" width="36" height="6" rx="3" fill="#ffaa55"/>
      <rect x="-18" y="67" width="36" height="6" rx="3" fill="#ffaa55"/>
    </g>
    <!-- Rod 3 (front) -->
    <ellipse cx="55" cy="-20" rx="12" ry="12" fill="#7a4010" opacity="0.85"/>
    <rect x="43" y="-90" width="24" height="170" rx="12" fill="url(#steel)" opacity="0.85"/>
    <ellipse cx="55" cy="80" rx="12" ry="12" fill="#e08030" opacity="0.85"/>
    <g opacity="0.7">
      <rect x="39" y="-60" width="32" height="5" rx="2" fill="#ff9944"/>
      <rect x="39" y="-40" width="32" height="5" rx="2" fill="#ff9944"/>
      <rect x="39" y="-20" width="32" height="5" rx="2" fill="#ff9944"/>
      <rect x="39" y="0" width="32" height="5" rx="2" fill="#ff9944"/>
      <rect x="39" y="20" width="32" height="5" rx="2" fill="#ff9944"/>
      <rect x="39" y="40" width="32" height="5" rx="2" fill="#ff9944"/>
    </g>
  </g>
  <!-- Label -->
  <rect x="0" y="255" width="400" height="45" fill="#000000" opacity="0.55"/>
  <text x="200" y="283" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="#e05a1e" text-anchor="middle" letter-spacing="3">BESI BETON ULIR (BJTD)</text>

</svg>