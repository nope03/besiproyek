<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">

  <defs>
    <linearGradient id="bghh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1018"/>
      <stop offset="100%" stop-color="#080a0e"/>
    </linearGradient>
    <linearGradient id="hface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0c5d8"/>
      <stop offset="100%" stop-color="#7880a0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bghh)"/>
  <pattern id="ghh" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-width="0.2" opacity="0.06"/>
  </pattern>
  <rect width="400" height="300" fill="url(#ghh)"/>
  <!-- Square hollow section isometric -->
  <g transform="translate(200,155)">
    <!-- Outer body -->
    <!-- Front face -->
    <rect x="-90" y="-85" width="180" height="170" fill="#8890b0" rx="3"/>
    <!-- Top face -->
    <polygon points="-90,-85 90,-85 115,-60 -65,-60" fill="#b0b8d0" opacity="0.8"/>
    <!-- Right face -->
    <polygon points="90,-85 115,-60 115,110 90,85" fill="#6870a0" opacity="0.7"/>
    <!-- Hollow bore - front -->
    <rect x="-70" y="-65" width="140" height="130" fill="#181820" rx="2"/>
    <!-- Hollow bore - top face -->
    <polygon points="-70,-65 70,-65 90,-45 -50,-45" fill="#121218" opacity="0.85"/>
    <!-- Hollow bore - right -->
    <polygon points="70,-65 90,-45 90,95 70,65" fill="#101018" opacity="0.9"/>
    <!-- Wall thickness indicator -->
    <text x="-89" y="-55" font-family="Arial, sans-serif" font-size="9" fill="#e05a1e" opacity="0.75">t</text>
    <!-- Sharp corner highlight (cold-formed) -->
    <line x1="-90" y1="-85" x2="90" y2="-85" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
    <line x1="-90" y1="-85" x2="-90" y2="85" stroke="#ffffff" stroke-width="1.5" opacity="0.25"/>
    <!-- Orange accent -->
    <rect x="-90" y="-85" width="180" height="5" fill="#e05a1e" opacity="0.5" rx="2"/>
    <!-- SHS label inside -->
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="16" fill="#6870a0" opacity="0.2" text-anchor="middle" font-weight="900">SHS</text>
  </g>
  <rect x="0" y="255" width="400" height="45" fill="#000000" opacity="0.55"/>
  <text x="200" y="283" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="#e05a1e" text-anchor="middle" letter-spacing="3">HOLLOW HITAM (SHS/RHS)</text>

</svg>