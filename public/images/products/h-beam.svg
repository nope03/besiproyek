<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">

  <defs>
    <linearGradient id="bgh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1218"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>
    <linearGradient id="hfl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8bdd0"/>
      <stop offset="100%" stop-color="#7880a0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bgh)"/>
  <pattern id="gh" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e05a1e" stroke-width="0.2" opacity="0.1"/>
  </pattern>
  <rect width="400" height="300" fill="url(#gh)"/>
  <!-- H section - more square proportions than WF -->
  <g transform="translate(200,150)">
    <!-- 3D perspective H-beam -->
    <!-- Left side plate -->
    <polygon points="-70,-95 -50,-75 -50,75 -70,95" fill="#6070a0" opacity="0.5"/>
    <!-- Right side plate -->
    <polygon points="70,-95 90,-75 90,75 70,95" fill="#7080b0" opacity="0.4"/>
    <!-- Top flange - top face -->
    <polygon points="-70,-95 70,-95 90,-75 -50,-75" fill="#c0c8e0" opacity="0.6"/>
    <!-- Bottom flange - bottom face -->
    <polygon points="-70,95 70,95 90,75 -50,75" fill="#9098b8" opacity="0.5"/>
    <!-- Top flange - front face -->
    <rect x="-70" y="-95" width="140" height="22" fill="#d0d5e8" rx="1"/>
    <!-- Bottom flange - front face -->
    <rect x="-70" y="73" width="140" height="22" fill="#c0c5d8" rx="1"/>
    <!-- Web - front face -->
    <rect x="-13" y="-73" width="26" height="146" fill="#a0a8c0"/>
    <!-- Shine top -->
    <rect x="-70" y="-95" width="140" height="3" fill="#ffffff" opacity="0.35" rx="1"/>
    <!-- Accent corner -->
    <rect x="-70" y="-95" width="10" height="22" fill="#e05a1e" opacity="0.6" rx="1"/>
    <!-- Dimension arrow H -->
    <line x1="-88" y1="-93" x2="-88" y2="93" stroke="#e05a1e" stroke-width="1.5"/>
    <polygon points="-88,-93 -85,-83 -91,-83" fill="#e05a1e"/>
    <polygon points="-88,93 -85,83 -91,83" fill="#e05a1e"/>
    <text x="-104" y="6" font-family="Arial, sans-serif" font-size="13" fill="#e05a1e" font-weight="bold" text-anchor="middle">H</text>
  </g>
  <rect x="0" y="255" width="400" height="45" fill="#000000" opacity="0.55"/>
  <text x="200" y="283" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="#e05a1e" text-anchor="middle" letter-spacing="3">H-BEAM STRUKTURAL</text>

</svg>